<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRICKET BLAST – Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pitch: #c8a84b;
    --green: #1a6b2a;
    --neon: #00ffe7;
    --red: #ff3c3c;
    --gold: #ffd700;
    --dark: #060d14;
    --panel: rgba(0,20,40,0.85);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--dark);
    font-family: 'Rajdhani', sans-serif;
    color: #eee;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
    user-select: none;
  }

  /* ── SCREENS ── */
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:10; transition: opacity .4s; }
  .screen.hidden { opacity:0; pointer-events:none; }

  /* ── THREE.JS CANVAS ── */
  #three-canvas { position:fixed; inset:0; z-index:0; }

  /* ── START SCREEN ── */
  #start-screen {
    background: radial-gradient(ellipse at 50% 60%, rgba(0,80,40,0.45) 0%, transparent 70%),
                radial-gradient(ellipse at 50% 0%, rgba(0,255,231,0.08) 0%, transparent 60%);
  }
  .logo {
    font-family:'Orbitron',monospace;
    font-size: clamp(2.5rem,7vw,5.5rem);
    font-weight:900;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 80px rgba(255,215,0,0.2);
    animation: pulse-logo 2.5s ease-in-out infinite;
    line-height:1;
    text-align:center;
  }
  .logo span { color: var(--neon); text-shadow: 0 0 20px var(--neon); }
  @keyframes pulse-logo { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)} }
  .subtitle {
    font-size:1.1rem; letter-spacing:.35em; color: var(--neon);
    text-transform:uppercase; margin: .5rem 0 2.5rem; opacity:.8;
  }
  .name-input-wrap { display:flex; flex-direction:column; align-items:center; gap:1rem; margin-bottom:2rem; }
  .name-input-wrap label { font-size:.85rem; letter-spacing:.2em; color:#aaa; text-transform:uppercase; }
  #player-name {
    background: rgba(0,255,231,0.05);
    border: 1.5px solid var(--neon);
    color: var(--neon);
    font-family:'Orbitron',monospace;
    font-size:1rem;
    padding:.65rem 1.4rem;
    border-radius:4px;
    text-align:center;
    outline:none;
    width:220px;
    letter-spacing:.1em;
  }
  #player-name::placeholder { color: rgba(0,255,231,0.3); }
  .btn {
    font-family:'Orbitron',monospace;
    font-size:.85rem;
    font-weight:700;
    letter-spacing:.2em;
    text-transform:uppercase;
    padding:.8rem 2.5rem;
    border:none;
    border-radius:4px;
    cursor:pointer;
    transition: all .2s;
    position:relative;
    overflow:hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, #00ffe7, #00b89c);
    color: #060d14;
    box-shadow: 0 0 20px rgba(0,255,231,0.4);
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 0 35px rgba(0,255,231,0.7); }
  .btn-primary:active { transform:translateY(0); }
  .btn-secondary {
    background: transparent;
    color: var(--gold);
    border: 1.5px solid var(--gold);
    box-shadow: 0 0 15px rgba(255,215,0,0.2);
    font-size:.75rem;
    padding:.6rem 1.8rem;
  }
  .btn-secondary:hover { background: rgba(255,215,0,0.08); box-shadow:0 0 25px rgba(255,215,0,0.4); }

  /* ── LEADERBOARD PANEL ── */
  .lb-panel {
    background: var(--panel);
    border: 1px solid rgba(0,255,231,0.2);
    border-radius:8px;
    padding:1.2rem 1.8rem;
    min-width:320px;
    max-width:420px;
    backdrop-filter:blur(12px);
    margin-top:1.5rem;
  }
  .lb-title {
    font-family:'Orbitron',monospace;
    font-size:.7rem;
    letter-spacing:.3em;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:1rem;
    display:flex; align-items:center; gap:.7rem;
  }
  .lb-title::before, .lb-title::after { content:''; flex:1; height:1px; background:rgba(255,215,0,0.3); }
  #lb-list { list-style:none; }
  #lb-list li {
    display:flex; align-items:center; gap:.8rem;
    padding:.4rem 0;
    border-bottom:1px solid rgba(255,255,255,0.05);
    font-size:.95rem;
  }
  #lb-list li:last-child { border-bottom:none; }
  .lb-rank { font-family:'Orbitron',monospace; font-size:.75rem; color:#555; width:1.2rem; text-align:right; }
  .lb-rank.gold { color:var(--gold); }
  .lb-rank.silver { color:#bbb; }
  .lb-rank.bronze { color:#cd7f32; }
  .lb-name { flex:1; color:#ddd; }
  .lb-score { font-family:'Orbitron',monospace; font-size:.9rem; color:var(--neon); }

  /* ── GAME SCREEN ── */
  #game-screen { pointer-events:none; background:none; }
  #game-canvas-wrap {
    position:absolute; inset:0; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
  }
  #game-canvas {
    position:absolute;
    /* sized by JS */
    border: 1px solid rgba(0,255,231,0.15);
    border-radius:4px;
    cursor: crosshair;
    z-index:5;
  }

  /* ── HUD ── */
  #hud {
    position:absolute; top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:space-between;
    padding:.8rem 1.5rem;
    background: linear-gradient(to bottom, rgba(6,13,20,0.9), transparent);
    pointer-events:none;
    z-index:20;
  }
  .hud-block { text-align:center; }
  .hud-label { font-size:.6rem; letter-spacing:.25em; color:#666; text-transform:uppercase; }
  .hud-value { font-family:'Orbitron',monospace; font-size:1.4rem; color:var(--neon); line-height:1; }
  .hud-value.gold { color:var(--gold); }
  .hud-value.red  { color:var(--red); }

  /* ── BALL TRAJECTORY HINT ── */
  #aim-line { position:absolute; pointer-events:none; z-index:6; }

  /* ── RESULT SCREEN ── */
  #result-screen { background: radial-gradient(ellipse at 50% 50%, rgba(0,40,20,0.6) 0%, rgba(6,13,20,0.97) 70%); }
  .result-title {
    font-family:'Orbitron',monospace;
    font-size:clamp(1.5rem,5vw,3rem);
    font-weight:900;
    color:var(--gold);
    text-shadow:0 0 30px rgba(255,215,0,0.5);
    margin-bottom:.4rem;
  }
  .result-score-wrap { margin:1.5rem 0; text-align:center; }
  .result-runs { font-family:'Orbitron',monospace; font-size:5rem; font-weight:900; color:var(--neon); line-height:1; text-shadow:0 0 40px rgba(0,255,231,0.5); }
  .result-label { font-size:.8rem; letter-spacing:.3em; color:#666; text-transform:uppercase; }
  .result-breakdown { display:flex; gap:2rem; margin-bottom:1.5rem; justify-content:center; }
  .rb-item { text-align:center; }
  .rb-num { font-family:'Orbitron',monospace; font-size:1.6rem; color:var(--gold); }
  .rb-lbl { font-size:.65rem; letter-spacing:.2em; color:#666; text-transform:uppercase; }
  .btn-row { display:flex; gap:1rem; margin-top:1rem; }

  /* ── BALLS INDICATOR ── */
  #balls-left { display:flex; gap:.4rem; align-items:center; }
  .ball-dot {
    width:10px; height:10px; border-radius:50%;
    background:var(--red); box-shadow:0 0 6px var(--red);
    transition: opacity .2s;
  }
  .ball-dot.used { opacity:.15; background:#333; box-shadow:none; }

  /* ── SHOT FEEDBACK ── */
  #shot-feedback {
    position:absolute; left:50%; top:38%; transform:translate(-50%,-50%);
    font-family:'Orbitron',monospace; font-size:2.5rem; font-weight:900;
    pointer-events:none; z-index:30; text-align:center;
    opacity:0; transition:opacity .1s;
    text-shadow:0 0 30px currentColor;
  }

  /* ── LOADING ── */
  #loading {
    position:fixed; inset:0; background:var(--dark);
    display:flex; align-items:center; justify-content:center;
    flex-direction:column; z-index:999; gap:1rem;
    transition: opacity .5s;
  }
  #loading.done { opacity:0; pointer-events:none; }
  .loader-bar-wrap { width:220px; height:3px; background:rgba(255,255,255,0.1); border-radius:2px; overflow:hidden; }
  .loader-bar { height:100%; background:var(--neon); width:0; border-radius:2px; transition:width .3s; }
  .loader-text { font-family:'Orbitron',monospace; font-size:.7rem; letter-spacing:.3em; color:var(--neon); opacity:.6; }

  /* ── POWER BAR ── */
  #power-wrap {
    position:absolute; bottom:2rem; left:50%; transform:translateX(-50%);
    display:flex; flex-direction:column; align-items:center; gap:.4rem;
    pointer-events:none; z-index:20;
  }
  #power-label { font-size:.6rem; letter-spacing:.2em; color:#666; text-transform:uppercase; }
  #power-bar-outer { width:180px; height:8px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; }
  #power-bar-inner { height:100%; width:0%; border-radius:4px; transition:width .05s linear; }
  #swing-hint { font-size:.65rem; letter-spacing:.15em; color:rgba(0,255,231,0.4); text-transform:uppercase; margin-top:.3rem; }

  /* ── DIFFICULTY BADGE ── */
  #diff-badge {
    font-family:'Orbitron',monospace; font-size:.55rem; letter-spacing:.2em;
    padding:.25rem .7rem; border-radius:2px; text-transform:uppercase;
    background: rgba(255,215,0,0.12); border:1px solid rgba(255,215,0,0.3);
    color:var(--gold);
  }

  @media(max-width:480px){
    .result-runs{font-size:3.5rem}
    .lb-panel{min-width:90vw}
  }
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="logo" style="font-family:'Orbitron',monospace;font-size:2rem;color:var(--gold)">CRICKET BLAST</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-text">Loading pitch…</div>
</div>

<!-- Three.js canvas (background 3D scene) -->
<canvas id="three-canvas"></canvas>

<!-- ════════════ START SCREEN ════════════ -->
<div class="screen" id="start-screen">
  <div class="logo">Cricket<br><span>Blast</span></div>
  <div class="subtitle">Arcade Edition</div>

  <div class="name-input-wrap">
    <label>Enter Your Name</label>
    <input id="player-name" type="text" maxlength="14" placeholder="BATSMAN" autocomplete="off" spellcheck="false">
  </div>

  <button class="btn btn-primary" id="btn-play">⚡ Play Now</button>

  <div class="lb-panel" style="margin-top:1.8rem">
    <div class="lb-title">Top Scorers</div>
    <ul id="lb-list"><li style="color:#555;font-size:.85rem;text-align:center;padding:.5rem">Loading…</li></ul>
  </div>
</div>

<!-- ════════════ GAME SCREEN ════════════ -->
<div class="screen hidden" id="game-screen">
  <div id="game-canvas-wrap">
    <canvas id="game-canvas"></canvas>
    <div id="shot-feedback"></div>
  </div>
  <!-- HUD -->
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">Runs</div>
      <div class="hud-value" id="hud-runs">0</div>
    </div>
    <div class="hud-block">
      <div id="diff-badge">EASY</div>
      <div id="balls-left"></div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Best Shot</div>
      <div class="hud-value gold" id="hud-best">—</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">Strike Rate</div>
      <div class="hud-value" id="hud-sr">—</div>
    </div>
  </div>
  <!-- Power bar -->
  <div id="power-wrap">
    <div id="power-label">Timing</div>
    <div id="power-bar-outer"><div id="power-bar-inner"></div></div>
    <div id="swing-hint">Click to swing</div>
  </div>
</div>

<!-- ════════════ RESULT SCREEN ════════════ -->
<div class="screen hidden" id="result-screen">
  <div class="result-title" id="result-title">INNINGS OVER</div>
  <div class="result-score-wrap">
    <div class="result-label">Total Runs</div>
    <div class="result-runs" id="result-runs">0</div>
  </div>
  <div class="result-breakdown">
    <div class="rb-item"><div class="rb-num" id="rb-6s">0</div><div class="rb-lbl">Sixes</div></div>
    <div class="rb-item"><div class="rb-num" id="rb-4s">0</div><div class="rb-lbl">Fours</div></div>
    <div class="rb-item"><div class="rb-num" id="rb-sr">—</div><div class="rb-lbl">Strike Rate</div></div>
  </div>
  <div class="lb-panel">
    <div class="lb-title">Leaderboard</div>
    <ul id="result-lb-list"><li style="color:#555;font-size:.85rem;text-align:center;padding:.5rem">Saving…</li></ul>
  </div>
  <div class="btn-row">
    <button class="btn btn-primary" id="btn-retry">🏏 Play Again</button>
    <button class="btn btn-secondary" id="btn-home">Home</button>
  </div>
</div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ═══════════════════════════════════════════════
   LEADERBOARD  — uses JSONBin.io (free, no auth read)
   The bin ID below is pre-created and shared; everyone
   reads & writes to the same bin so scores are global.
   ═══════════════════════════════════════════════ */
const BIN_ID  = 'cricket-blast-v1-arcade';
const STORAGE_KEY = 'cricket_blast_lb';

// We'll use localStorage as the leaderboard store
// (persists per browser; for a truly shared leaderboard,
//  replace saveScore/loadScores with a fetch to your Vercel API)
function loadScores() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e){ return []; }
}
function saveScore(name, score, sixes, fours) {
  const all = loadScores();
  all.push({ name: name.trim().toUpperCase() || 'ANON', score, sixes, fours, ts: Date.now() });
  all.sort((a,b)=>b.score-a.score);
  const top = all.slice(0,10);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(top));
  return top;
}
function renderLb(listEl, scores) {
  if(!scores.length){ listEl.innerHTML='<li style="color:#555;text-align:center;padding:.5rem;font-size:.85rem">No scores yet — be the first!</li>'; return; }
  const medals = ['gold','silver','bronze'];
  listEl.innerHTML = scores.map((s,i)=>`
    <li>
      <span class="lb-rank ${medals[i]||''}">${i+1}</span>
      <span class="lb-name">${escHtml(s.name)}</span>
      <span class="lb-score">${s.score}</span>
    </li>`).join('');
}
function escHtml(s){ return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

/* ═══════════════════════════════════════════════
   THREE.JS 3D BACKGROUND SCENE
   ═══════════════════════════════════════════════ */
(function initThree(){
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  const scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x060d14, 0.018);

  const camera = new THREE.PerspectiveCamera(55, 1, 0.1, 200);
  camera.position.set(0, 8, 22);
  camera.lookAt(0, 0, 0);

  function resize(){
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  resize();
  window.addEventListener('resize', resize);

  /* Lights */
  scene.add(new THREE.AmbientLight(0x112233, 1.2));
  const sun = new THREE.DirectionalLight(0xfff8e0, 2.5);
  sun.position.set(10,20,10);
  sun.castShadow = true;
  sun.shadow.mapSize.set(1024,1024);
  scene.add(sun);
  const fill = new THREE.PointLight(0x00ffe7, 1.2, 60);
  fill.position.set(-8, 4, 8);
  scene.add(fill);
  const rim = new THREE.PointLight(0xff6600, 0.8, 50);
  rim.position.set(8,3,-10);
  scene.add(rim);

  /* Stadium flood lights */
  [[-14,12,-12],[14,12,-12],[-14,12,12],[14,12,12]].forEach(([x,y,z])=>{
    const spot = new THREE.SpotLight(0xfff5cc, 2.5, 80, Math.PI/7, 0.4, 1.5);
    spot.position.set(x,y,z); spot.target.position.set(0,0,0);
    scene.add(spot); scene.add(spot.target);
    // pole
    const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.12,0.12,y,6), new THREE.MeshStandardMaterial({color:0x333333,metalness:.6,roughness:.4}));
    pole.position.set(x,y/2,z); scene.add(pole);
  });

  /* Ground */
  const ground = new THREE.Mesh(
    new THREE.CircleGeometry(35, 64),
    new THREE.MeshStandardMaterial({color:0x1a5c20, roughness:.9, metalness:.0})
  );
  ground.rotation.x = -Math.PI/2; ground.receiveShadow=true;
  scene.add(ground);

  /* Pitch strip */
  const pitch = new THREE.Mesh(
    new THREE.PlaneGeometry(2.5, 20),
    new THREE.MeshStandardMaterial({color:0xc8a84b, roughness:.8})
  );
  pitch.rotation.x=-Math.PI/2; pitch.position.y=.01; pitch.receiveShadow=true;
  scene.add(pitch);

  /* Crease lines */
  [[8.5],[9.5],[-8.5],[-9.5]].forEach(([z])=>{
    const m = new THREE.Mesh(new THREE.PlaneGeometry(2.5,.06),new THREE.MeshBasicMaterial({color:0xffffff}));
    m.rotation.x=-Math.PI/2; m.position.set(0,.02,z); scene.add(m);
  });

  /* Stumps */
  function makeStumps(z){
    [-0.23,0,0.23].forEach(x=>{
      const s = new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.72,8), new THREE.MeshStandardMaterial({color:0xf5e6c8,metalness:.1,roughness:.6}));
      s.position.set(x,.36,z); s.castShadow=true; scene.add(s);
    });
    // bails
    const bail = new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,.5,6), new THREE.MeshStandardMaterial({color:0xf5e6c8}));
    bail.rotation.z=Math.PI/2; bail.position.set(0,.75,z); scene.add(bail);
  }
  makeStumps(9.2); makeStumps(-9.2);

  /* Stadium ring stands (low-poly bleachers) */
  for(let i=0;i<32;i++){
    const angle = (i/32)*Math.PI*2;
    const r = 30 + Math.random()*2;
    const w = 2.5+Math.random();
    const h = 1.5+Math.random()*2.5;
    const block = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, 1.2),
      new THREE.MeshStandardMaterial({color: new THREE.Color().setHSL(Math.random()*.1+.08, .4, .25+Math.random()*.1), roughness:1})
    );
    block.position.set(Math.cos(angle)*r, h/2-0.5, Math.sin(angle)*r);
    block.rotation.y = -angle;
    scene.add(block);
  }

  /* Floating score particles pool */
  window.threeScene = scene;
  window.scoreParticles = [];
  function spawnParticles(x,y,z,color){
    for(let i=0;i<18;i++){
      const g = new THREE.SphereGeometry(.07,4,4);
      const m = new THREE.MeshBasicMaterial({color});
      const p = new THREE.Mesh(g,m);
      p.position.set(x,y,z);
      p.userData.vel = new THREE.Vector3((Math.random()-.5)*5, Math.random()*6+2, (Math.random()-.5)*5);
      p.userData.life=1; p.userData.maxLife=1;
      scene.add(p); window.scoreParticles.push(p);
    }
  }
  window.spawnParticles = spawnParticles;

  /* Cricket ball (animated bouncer) */
  const ballGeo = new THREE.SphereGeometry(.14,16,16);
  const ballMat = new THREE.MeshStandardMaterial({color:0xcc1111, roughness:.5, metalness:.2});
  const ball3d = new THREE.Mesh(ballGeo, ballMat);
  ball3d.castShadow=true;
  scene.add(ball3d);
  window.ball3d = ball3d;
  window.ball3dT = 0;

  /* Bat */
  const batGrp = new THREE.Group();
  const blade = new THREE.Mesh(new THREE.BoxGeometry(.08,1.1,.2), new THREE.MeshStandardMaterial({color:0xdeb887,roughness:.7}));
  blade.position.y=.3;
  const handle = new THREE.Mesh(new THREE.CylinderGeometry(.03,.03,.55,8), new THREE.MeshStandardMaterial({color:0x3c2808,roughness:.8}));
  handle.position.y=-.7;
  batGrp.add(blade); batGrp.add(handle);
  batGrp.position.set(.8,.5,8.5);
  scene.add(batGrp);
  window.batGrp = batGrp;
  window.batSwing=0;

  /* Stars */
  {
    const sg = new THREE.BufferGeometry();
    const sv = [];
    for(let i=0;i<400;i++){
      sv.push((Math.random()-.5)*200, Math.random()*60+10, (Math.random()-.5)*200);
    }
    sg.setAttribute('position', new THREE.Float32BufferAttribute(sv,3));
    scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0xffffff,size:.25,sizeAttenuation:true,transparent:true,opacity:.6})));
  }

  /* Camera gentle drift */
  let camT=0;
  function animate(){
    requestAnimationFrame(animate);
    const dt = 0.016;
    camT += dt;

    // Ball idle bounce
    if(!window.ballFlying){
      window.ball3dT += dt*1.8;
      const t = window.ball3dT;
      ball3d.position.set(
        Math.sin(t*.7)*.3,
        Math.abs(Math.sin(t*2.2))*1.1+.15,
        -2 + Math.cos(t*.5)*.5
      );
    }

    // Bat idle sway
    if(!window.swinging){
      batGrp.rotation.z = Math.sin(camT*1.2)*.08;
    } else {
      batGrp.rotation.z -= .18;
      if(batGrp.rotation.z < -1.5) window.swinging=false;
    }

    // Camera slow orbit
    camera.position.x = Math.sin(camT*.04)*3;
    camera.position.y = 8 + Math.sin(camT*.07)*.5;
    camera.lookAt(0,1,0);

    // Particles
    window.scoreParticles = window.scoreParticles.filter(p=>{
      p.userData.life -= dt*1.5;
      if(p.userData.life<=0){ scene.remove(p); return false; }
      p.userData.vel.y -= 9*dt;
      p.position.addScaledVector(p.userData.vel, dt);
      p.material.opacity = p.userData.life;
      p.material.transparent=true;
      return true;
    });

    renderer.render(scene,camera);
  }
  animate();
})();

/* ═══════════════════════════════════════════════
   2D GAME ENGINE  (overlaid canvas)
   ═══════════════════════════════════════════════ */
const GC = document.getElementById('game-canvas');
const ctx = GC.getContext('2d');
const TOTAL_BALLS = 8;

let gameState = {
  runs:0, balls:0, sixes:0, fours:0,
  bestShot: null, playerName:'BATSMAN',
  phase: 'idle', // idle | charging | ball-in | result
  powerBar: 0, powerDir: 1,
  ballX:0, ballY:0, ballTargetX:0, ballTargetY:0,
  ballT:0, ballDur:0,
  difficulty: 1,
};

const SHOT_ZONES = [
  {name:'SIX!',    runs:6, color:'#ffd700', prob:.15},
  {name:'FOUR',    runs:4, color:'#00ffe7', prob:.25},
  {name:'THREE',   runs:3, color:'#7fff7f', prob:.15},
  {name:'TWO',     runs:2, color:'#aaffaa', prob:.20},
  {name:'ONE',     runs:1, color:'#dddddd', prob:.15},
  {name:'MISS!',   runs:0, color:'#ff4444', prob:.10},
];

function getW(){ return Math.min(window.innerWidth*.85, window.innerHeight*.95, 500); }
function resize2d(){
  const w = getW();
  GC.width = w; GC.height = w * 1.05;
  GC.style.width  = GC.width  + 'px';
  GC.style.height = GC.height + 'px';
}
resize2d();
window.addEventListener('resize', resize2d);

function W(){ return GC.width; }
function H(){ return GC.height; }

/* ── DRAW FUNCTIONS ── */
function drawPitch(){
  const w = W(), h = H();
  // Sky gradient bg
  const sky = ctx.createLinearGradient(0,0,0,h*.55);
  sky.addColorStop(0,'#0a1a2e');
  sky.addColorStop(1,'#0d2d1a');
  ctx.fillStyle=sky; ctx.fillRect(0,0,w,h);

  // Outfield
  const field = ctx.createRadialGradient(w/2,h*.55,20,w/2,h*.55,w*.7);
  field.addColorStop(0,'#1e7a30'); field.addColorStop(1,'#124d1e');
  ctx.fillStyle=field; ctx.fillRect(0,h*.15,w,h);

  // Pitch rectangle
  const px=w*.38, py=h*.12, pw=w*.24, ph=h*.72;
  const pitchGrad = ctx.createLinearGradient(px,py,px+pw,py+ph);
  pitchGrad.addColorStop(0,'#d4a84b'); pitchGrad.addColorStop(1,'#b88c30');
  ctx.fillStyle=pitchGrad;
  ctx.fillRect(px,py,pw,ph);

  // Crease lines
  ctx.strokeStyle='rgba(255,255,255,0.7)'; ctx.lineWidth=2;
  [py+ph*.12, py+ph*.15, py+ph*.85, py+ph*.88].forEach(y=>{
    ctx.beginPath(); ctx.moveTo(px,y); ctx.lineTo(px+pw,y); ctx.stroke();
  });

  // Pitch texture
  for(let i=0;i<5;i++){
    ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(px+pw*.2*i,py); ctx.lineTo(px+pw*.2*i+pw*.1,py+ph); ctx.stroke();
  }

  // Stumps (far end)
  const sx = w/2, sy = py+8, sw=2, sh=28;
  [-10,0,10].forEach(dx=>{
    ctx.fillStyle='#f5e6c8';
    ctx.fillRect(sx+dx-sw/2, sy, sw, sh);
  });
  ctx.fillStyle='#f5e6c8';
  ctx.fillRect(sx-12, sy, 24, 3);

  // Near stumps
  const nsy = py+ph-8;
  [-10,0,10].forEach(dx=>{
    ctx.fillStyle='#f5e6c8';
    ctx.fillRect(sx+dx-sw/2, nsy-sh, sw, sh);
  });
  ctx.fillStyle='#f5e6c8';
  ctx.fillRect(sx-12, nsy-sh, 24, 3);

  // Batsman
  drawBatsman(w/2+w*.12, nsy-sh-10);
}

function drawBatsman(x,y){
  const t = Date.now()/1000;
  const swing = gameState.phase==='charging' ? -Math.PI*.3 : 0;
  const w=W();
  const scale = w/400;

  ctx.save(); ctx.translate(x,y);

  // Body
  ctx.fillStyle='#2244aa';
  ctx.beginPath(); ctx.ellipse(0,0,12*scale,20*scale,0,0,Math.PI*2); ctx.fill();
  // Helmet
  ctx.fillStyle='#1133cc';
  ctx.beginPath(); ctx.arc(0,-22*scale,12*scale,Math.PI,0); ctx.fill();
  // Face
  ctx.fillStyle='#f0c070';
  ctx.beginPath(); ctx.arc(0,-22*scale,9*scale,0,Math.PI*2); ctx.fill();
  // Pads
  ctx.fillStyle='#eee';
  ctx.fillRect(-14*scale, 5*scale, 10*scale, 18*scale);
  ctx.fillRect( 4*scale,  5*scale, 10*scale, 18*scale);
  // Bat arm
  ctx.save(); ctx.translate(16*scale,0); ctx.rotate(swing - Math.sin(t*2)*.08);
  // bat
  ctx.fillStyle='#deb887';
  ctx.fillRect(-3*scale,-5*scale,6*scale,35*scale);
  ctx.fillStyle='#4a2800';
  ctx.fillRect(-2*scale,-20*scale,4*scale,16*scale);
  ctx.restore();

  ctx.restore();
}

function drawBall(){
  if(gameState.phase !== 'ball-in' && gameState.phase !== 'result-shot') return;
  const {ballX,ballY} = gameState;
  const r = W()*.025;
  // Shadow
  const shadowY = H()*.75;
  const t = gameState.ballT/gameState.ballDur;
  const shadowScale = .3+t*.7;
  ctx.beginPath(); ctx.ellipse(ballX, shadowY, r*shadowScale*2, r*shadowScale*.5, 0, 0, Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.fill();
  // Ball
  const grad = ctx.createRadialGradient(ballX-r*.3,ballY-r*.3,r*.1,ballX,ballY,r);
  grad.addColorStop(0,'#ff6666'); grad.addColorStop(1,'#880000');
  ctx.beginPath(); ctx.arc(ballX,ballY,r,0,Math.PI*2);
  ctx.fillStyle=grad; ctx.fill();
  // Seam
  ctx.beginPath(); ctx.arc(ballX,ballY,r*.7,-Math.PI*.3,Math.PI*.3);
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.stroke();
}

function drawAimZones(){
  if(gameState.phase!=='idle') return;
  const w=W(), h=H();
  const zones = [
    {x:.1,y:.25,w:.25,h:.2, label:'SIX',color:'rgba(255,215,0,0.12)',border:'rgba(255,215,0,0.4)'},
    {x:.65,y:.25,w:.25,h:.2, label:'SIX',color:'rgba(255,215,0,0.12)',border:'rgba(255,215,0,0.4)'},
    {x:.05,y:.5,w:.3,h:.18, label:'FOUR',color:'rgba(0,255,231,0.08)',border:'rgba(0,255,231,0.3)'},
    {x:.65,y:.5,w:.3,h:.18, label:'FOUR',color:'rgba(0,255,231,0.08)',border:'rgba(0,255,231,0.3)'},
  ];
  zones.forEach(z=>{
    ctx.fillStyle=z.color; ctx.strokeStyle=z.border; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(z.x*w,z.y*h,z.w*w,z.h*h,6);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle=z.border; ctx.font=`bold ${w*.022}px Orbitron,monospace`;
    ctx.textAlign='center';
    ctx.fillText(z.label, (z.x+z.w/2)*w, (z.y+z.h/2)*h+5);
  });
}

let animFrame;
function gameLoop(){
  animFrame = requestAnimationFrame(gameLoop);
  ctx.clearRect(0,0,W(),H());
  drawPitch();
  drawAimZones();
  drawBall();
  updatePowerBar();
}

/* ── POWER BAR ── */
let powerInterval;
function startPowerBar(){
  const inner = document.getElementById('power-bar-inner');
  const speed = 0.8 + gameState.difficulty*.35;
  gameState.powerBar=0; gameState.powerDir=1;
  powerInterval = setInterval(()=>{
    gameState.powerBar += gameState.powerDir * speed;
    if(gameState.powerBar>=100){ gameState.powerBar=100; gameState.powerDir=-1; }
    if(gameState.powerBar<=0){ gameState.powerBar=0; gameState.powerDir=1; }
    inner.style.width = gameState.powerBar+'%';
    const hue = gameState.powerBar > 70 ? 120 : gameState.powerBar > 40 ? 60 : 0;
    inner.style.background = `hsl(${hue},100%,55%)`;
    inner.style.boxShadow = `0 0 ${gameState.powerBar*.15}px hsl(${hue},100%,55%)`;
  },16);
}
function stopPowerBar(){ clearInterval(powerInterval); }
function updatePowerBar(){}

/* ── SHOT RESULT ── */
function calcShot(power, clickX, clickY){
  const w=W(), h=H();
  // Zone bonus: clicked in six zone?
  let bonus = 0;
  const sixZones = [{x:.1,y:.25,w:.25,h:.2},{x:.65,y:.25,w:.25,h:.2}];
  const fourZones = [{x:.05,y:.5,w:.3,h:.18},{x:.65,y:.5,w:.3,h:.18}];
  sixZones.forEach(z=>{ if(clickX>z.x*w&&clickX<(z.x+z.w)*w&&clickY>z.y*h&&clickY<(z.y+z.h)*h) bonus=2; });
  fourZones.forEach(z=>{ if(clickX>z.x*w&&clickX<(z.x+z.w)*w&&clickY>z.y*h&&clickY<(z.y+z.h)*h) bonus=1; });

  // Timing band
  const sweet = power > 55 && power < 85;
  const decent = (power>30&&power<=55)||(power>=85&&power<95);
  let baseMult = sweet ? 1 : decent ? .7 : .4;

  // Miss chance scales with difficulty
  const missCh = Math.max(0.05, 0.18 - (gameState.difficulty-1)*.02 - (sweet?.1:0));
  if(Math.random()<missCh) return {name:'MISS!', runs:0, color:'#ff4444'};

  // Pick shot
  let r = Math.random();
  if(sweet && bonus===2 && r<.55) return {name:'SIX!', runs:6, color:'#ffd700'};
  if(sweet && bonus>=1 && r<.5)  return {name:'FOUR', runs:4, color:'#00ffe7'};
  if(sweet && r<.35) return r<.15?{name:'SIX!',runs:6,color:'#ffd700'}:{name:'FOUR',runs:4,color:'#00ffe7'};

  // Weighted random from SHOT_ZONES
  let cum=0;
  for(const z of SHOT_ZONES){
    cum+=z.prob;
    if(r<cum) return z;
  }
  return SHOT_ZONES[4];
}

/* ── SHOW FEEDBACK ── */
let feedbackTimeout;
function showFeedback(text, color){
  const el = document.getElementById('shot-feedback');
  el.textContent=text; el.style.color=color; el.style.opacity='1';
  el.style.transform='translate(-50%,-50%) scale(1.2)';
  clearTimeout(feedbackTimeout);
  feedbackTimeout = setTimeout(()=>{
    el.style.opacity='0';
    el.style.transform='translate(-50%,-50%) scale(0.8)';
  }, 900);
}

/* ── BALLS INDICATOR ── */
function renderBalls(){
  const wrap = document.getElementById('balls-left');
  wrap.innerHTML='';
  for(let i=0;i<TOTAL_BALLS;i++){
    const d=document.createElement('div');
    d.className='ball-dot'+(i>=TOTAL_BALLS-gameState.balls?' used':'');
    wrap.appendChild(d);
  }
}

/* ── HUD ── */
function updateHud(){
  document.getElementById('hud-runs').textContent=gameState.runs;
  const ballsFaced = TOTAL_BALLS-gameState.balls;
  const sr = ballsFaced>0 ? Math.round(gameState.runs/ballsFaced*100) : 0;
  document.getElementById('hud-sr').textContent = ballsFaced>0 ? sr : '—';
  document.getElementById('hud-best').textContent = gameState.bestShot ? gameState.bestShot.name : '—';
  const diffNames=['EASY','MEDIUM','HARD','BEAST'];
  document.getElementById('diff-badge').textContent=diffNames[Math.min(gameState.difficulty-1,3)];
  renderBalls();
}

/* ── DIFFICULTY ── */
function updateDifficulty(){
  if(gameState.runs>=30) gameState.difficulty=3;
  else if(gameState.runs>=15) gameState.difficulty=2;
  else gameState.difficulty=1;
}

/* ── ANIMATE BALL IN FLIGHT ── */
function animateBall(targetX, targetY, onDone){
  const startX = W()/2, startY = H()*.2;
  gameState.ballX=startX; gameState.ballY=startY;
  gameState.phase='ball-in';
  gameState.ballT=0; gameState.ballDur=0.55;
  gameState.ballTargetX=targetX; gameState.ballTargetY=targetY;

  // 3D ball also flies
  window.ballFlying=true;
  const ball3d = window.ball3d;
  ball3d.position.set(0, 1.5, -8);

  let last = performance.now();
  function fly(now){
    const dt = (now-last)/1000; last=now;
    gameState.ballT = Math.min(gameState.ballT+dt, gameState.ballDur);
    const t = gameState.ballT/gameState.ballDur;
    const ease = t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2;

    gameState.ballX = startX + (targetX-startX)*ease;
    const arc = Math.sin(t*Math.PI)*H()*.22;
    gameState.ballY = startY + (H()*.72-startY)*ease - arc;

    // 3D
    ball3d.position.set(
      (targetX/W()-.5)*4,
      1.5+Math.sin(t*Math.PI)*4,
      -8+t*15
    );
    ball3d.rotation.x += .15;

    if(gameState.ballT>=gameState.ballDur){
      window.ballFlying=false;
      ball3d.position.set(0,0.15,9);
      onDone();
    } else {
      requestAnimationFrame(fly);
    }
  }
  requestAnimationFrame(fly);
}

/* ── CLICK HANDLER ── */
function onGameClick(e){
  if(gameState.phase==='ball-in') return;
  if(gameState.balls<=0) return;

  const rect = GC.getBoundingClientRect();
  const cx = (e.clientX||e.touches[0].clientX)-rect.left;
  const cy = (e.clientY||e.touches[0].clientY)-rect.top;

  if(gameState.phase==='idle'){
    // Start charging
    gameState.phase='charging';
    document.getElementById('swing-hint').textContent='Release to SWING!';
    startPowerBar();
    return;
  }
  if(gameState.phase==='charging'){
    // Release — fire
    stopPowerBar();
    const power = gameState.powerBar;
    const shot = calcShot(power, cx, cy);
    window.swinging=true;

    // Animate ball
    animateBall(cx, cy, ()=>{
      // Apply result
      gameState.runs += shot.runs;
      gameState.balls--;
      if(!gameState.bestShot || shot.runs>gameState.bestShot.runs) gameState.bestShot=shot;
      updateDifficulty();
      updateHud();

      showFeedback(shot.name, shot.color);
      // 3D particles
      window.spawnParticles((cx/W()-.5)*10, 3, 5, shot.color==='#ffd700'?0xffd700:shot.color==='#00ffe7'?0x00ffe7:0xff4444);

      if(gameState.balls<=0){
        gameState.phase='done';
        setTimeout(showResult, 1200);
      } else {
        gameState.phase='idle';
        document.getElementById('swing-hint').textContent='Click to charge';
      }
    });
  }
}

GC.addEventListener('click', onGameClick);
GC.addEventListener('touchend', e=>{ e.preventDefault(); onGameClick(e); }, {passive:false});

/* ═══════════════════════════════════════════════
   SCREEN MANAGEMENT
   ═══════════════════════════════════════════════ */
function showScreen(id){
  ['start-screen','game-screen','result-screen'].forEach(s=>{
    document.getElementById(s).classList.toggle('hidden', s!==id);
  });
}

function startGame(){
  gameState = {
    runs:0, balls:TOTAL_BALLS, sixes:0, fours:0,
    bestShot:null, phase:'idle', difficulty:1,
    powerBar:0, powerDir:1,
    ballX:0, ballY:0, ballTargetX:0, ballTargetY:0,
    ballT:0, ballDur:0,
    playerName: document.getElementById('player-name').value.trim()||'BATSMAN',
  };
  resize2d();
  updateHud();
  document.getElementById('swing-hint').textContent='Click to charge';
  document.getElementById('power-bar-inner').style.width='0%';
  showScreen('game-screen');
  cancelAnimationFrame(animFrame);
  gameLoop();
}

function showResult(){
  cancelAnimationFrame(animFrame);
  const ballsFaced = TOTAL_BALLS;
  const sr = Math.round(gameState.runs/ballsFaced*100);
  const titles = ['Out for a duck…','Decent knock!','Good innings!','Super knock!','CENTURY HERO! 🏆'];
  const t = gameState.runs===0?0:gameState.runs<15?1:gameState.runs<30?2:gameState.runs<50?3:4;

  document.getElementById('result-title').textContent = titles[t];
  document.getElementById('result-runs').textContent  = gameState.runs;
  document.getElementById('rb-6s').textContent        = gameState.sixes;
  document.getElementById('rb-4s').textContent        = gameState.fours;
  document.getElementById('rb-sr').textContent        = sr;
  showScreen('result-screen');

  const all = saveScore(gameState.playerName, gameState.runs);
  renderLb(document.getElementById('result-lb-list'), all);
  renderLb(document.getElementById('lb-list'), all);
}

/* ─ Buttons ─ */
document.getElementById('btn-play').addEventListener('click',()=>{
  const n = document.getElementById('player-name').value.trim();
  if(!n){ document.getElementById('player-name').focus(); return; }
  startGame();
});
document.getElementById('player-name').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-play').click(); });
document.getElementById('btn-retry').addEventListener('click',startGame);
document.getElementById('btn-home').addEventListener('click',()=>{
  cancelAnimationFrame(animFrame);
  stopPowerBar();
  showScreen('start-screen');
  renderLb(document.getElementById('lb-list'), loadScores());
});

/* ═══════════════════════════════════════════════
   BOOT
   ═══════════════════════════════════════════════ */
(function boot(){
  const bar = document.getElementById('loader-bar');
  const loading = document.getElementById('loading');
  let p=0;
  const iv = setInterval(()=>{
    p+=Math.random()*18;
    bar.style.width = Math.min(p,90)+'%';
    if(p>=90){ clearInterval(iv);
      setTimeout(()=>{
        bar.style.width='100%';
        setTimeout(()=>{
          loading.classList.add('done');
          renderLb(document.getElementById('lb-list'), loadScores());
        },400);
      },300);
    }
  },120);
})();

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.code==='Space'||e.code==='Enter'){
    const gs = document.getElementById('game-screen');
    if(!gs.classList.contains('hidden')){
      e.preventDefault();
      GC.dispatchEvent(new MouseEvent('click',{clientX: GC.getBoundingClientRect().left+W()/2, clientY:GC.getBoundingClientRect().top+H()*.6}));
    }
  }
});
</script>
